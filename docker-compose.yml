version: '3.8'

services:
  db:
    image: postgres:15
    container_name: b100_postgres_warehouse
    environment:
      POSTGRES_USER: bluestock_user
      POSTGRES_PASSWORD: bluestock_password
      POSTGRES_DB: b100_warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: